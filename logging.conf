[loggers]
keys=root,bubble_index

[handlers]
keys=console

[formatters]
keys=standard

[logger_root]
level=INFO
handlers=console

[logger_bubble_index]
level=INFO
handlers=console
qualname=bubble_index
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=standard
args=(sys.stderr,)

[formatter_standard]
format=%(asctime)s %(levelname)s [%(name)s] %(message)s
datefmt=%Y-%m-%d %H:%M:%S
